apiVersion: v1
kind: Namespace
metadata:
  name: practice-lab
---

apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: practice-lab
data:
  APP_COLOR: "blue"
---

apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: practice-lab
type: Opaque
data:
  DB_PASSWORD: cGFzc3dvcmQ=

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: db-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  hostPath:
    path: /mnt/data/db

---
