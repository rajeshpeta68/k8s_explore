apiVersion: batch/v1
kind: CronJob
metadata:
  name: cleanup-job
  namespace: ecommerce
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cleanup
            image: busybox
            args:
            - /bin/sh
            - -c
            - "echo Cleaning up old data... && sleep 10"
          restartPolicy: OnFailure