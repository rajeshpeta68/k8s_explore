apiVersion: v1
kind: Pod
metadata:
  name: init-pod
spec:
  volumes:
  - name: shared-volume
    emptyDir: {}
  initContainers:
  - name: init-container
    image: busybox
    command: ['sh', '-c', 'echo "Hello from init container" > /shared-volume/message']
    volumeMounts:
    - name: shared-volume
      mountPath: /shared-volume
  containers:
  - name: main-container
    image: busybox
    command: ['sh', '-c', 'cat /shared-volume/message && sleep 3600']
    volumeMounts:
    - name: shared-volume
      mountPath: /shared-volume