apiVersion: v1
kind: ServiceAccount
metadata:
  name: web-app-sa
  namespace: dev

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: web-app-role
  namespace: dev
rules:
- apiGroups: [""]
  resources: ["pods", "configmaps", "secrets", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: web-app-rolebinding
  namespace: dev
subjects:
- kind: ServiceAccount
  name: web-app-sa
  namespace: dev
roleRef:
  kind: Role
  name: web-app-role
  apiGroup: rbac.authorization.k8s.io