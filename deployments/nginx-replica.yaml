apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replica
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-replica
  template:
    metadata:
      labels:
        app: nginx-replica
    spec:
      containers:
      - name: nginx
        image: nginx:1.19
        resources: {} 